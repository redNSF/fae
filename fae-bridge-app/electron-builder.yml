appId: "com.fae.bridge"
productName: "FAE Bridge"
copyright: "Copyright © 2026 Riyad Shuvro"

directories:
  output: build

files:
  - "src/**/*"
  - "assets/**/*"
  - "package.json"

extraResources:
  - from: "assets/"
    to: "assets/"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: "assets/tray-icon.png"
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true
  shortcutName: "FAE Bridge"
  runAfterFinish: true
  deleteAppDataOnUninstall: false

publish: null
